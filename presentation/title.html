<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bing Rewards Automator - Presentation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: #FDFFFC;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', serif;
        }
        
        .content {
            width: 60%;
            text-align: center;
            padding: 0 40px;
        }
        
        .title {
            font-size: 64px;
            font-weight: 700;
            color: #1D2D44;
            margin-bottom: 24px;
            line-height: 1.2;
            letter-spacing: -1px;
        }
        
        .subtitle {
            font-size: 28px;
            font-weight: 400;
            color: #3E5C76;
            margin-bottom: 32px;
            line-height: 1.4;
        }
        
        .divider {
            width: 80px;
            height: 2px;
            border-top: 1px solid #2A9D8F;
            border-bottom: 1px solid #2A9D8F;
            margin: 32px auto;
        }
        
        .description {
            font-size: 18px;
            font-weight: 400;
            color: #3E5C76;
            line-height: 1.6;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .accent-box {
            display: inline-block;
            background: rgba(42, 157, 143, 0.1);
            padding: 20px 30px;
            border-left: 3px solid #2A9D8F;
            margin-top: 32px;
            text-align: left;
        }
        
        .accent-box strong {
            color: #2A9D8F;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="content">
            <h1 class="title">Bing Rewards Automator</h1>
            <div class="divider"></div>
            <p class="subtitle">Automate Your Rewards Safely</p>
            <p class="description">A comprehensive tool for automating Bing Rewards searches across desktop and mobile platforms with built-in anti-detection measures.</p>
            <div class="accent-box">
                <strong>Earn 25–250 points per day</strong> automatically across all Bing Rewards tiers
            </div>
        </div>
    </div>
</body>
</html>
